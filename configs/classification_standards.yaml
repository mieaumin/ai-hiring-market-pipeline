source_grade:
  A:
    meaning: Official API available.
    collection_allowed: true if policy/evidence valid.
  B:
    meaning: Public ATS/API endpoint available.
    collection_allowed: true if policy/evidence valid.
  C:
    meaning: Public company career page or public job page with acceptable robots and terms.
    collection_allowed: true only after careful review.
  D:
    meaning: Unclear policy or general scraping needed.
    collection_allowed: false until manual/legal review.
  E:
    meaning: Login, CAPTCHA, anti-bot bypass, or prohibited automated collection required.
    collection_allowed: false.
  F:
    meaning: Unusable, blocked, or rejected.
    collection_allowed: false.

