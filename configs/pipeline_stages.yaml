phases:
  phase0_korean_job_site_discovery:
    name: Korean Job-Site Discovery
    input_files:
      - configs/job_site_discovery_queries.yaml
      - configs/job_site_discovery_sources.yaml
    output_files:
      - runtime/raw_job_site_discovery.csv
    promotion_rule: Discovery creates raw source candidates only; it does not approve collection.
    blocking_conditions:
      - jd_collection_attempted
      - job_posting_crawling_attempted
      - search_result_scraping_when_not_allowed
      - login_or_captcha_bypass_attempted

  phase0_5_job_site_evidence_review_and_screening:
    name: Job-Site Evidence Review and Source Screening
    input_files:
      - runtime/raw_job_site_discovery.csv
      - runtime/site_policy_evidence.csv
      - configs/policy_keywords.yaml
    output_files:
      - runtime/site_screening_results.csv
      - staging/job_site_registry_staging.csv
      - master/job_source_registry.csv
    promotion_rule: Site must have traceable evidence and pass strict legal, policy, and technical screening.
    blocking_conditions:
      - robots_blocked
      - terms_prohibit_collection
      - login_required
      - captcha_required
      - anti_bot_bypass_required
      - reuse_restriction_critical

  phase1_company_discovery:
    name: Korean AI Hiring Company Discovery
    input_files:
      - runtime/raw_company_discovery.csv
      - runtime/company_evidence.csv
    output_files:
      - staging/company_registry_staging.csv
      - master/company_registry_master.csv
    promotion_rule: Company must have traceable evidence and approved company screening.
    blocking_conditions:
      - no_traceable_evidence
      - weak_signal_only
      - ambiguous_company_identity

  phase2_company_source_discovery:
    name: Company Source Discovery
    input_files:
      - master/company_registry_master.csv
      - runtime/source_discovery.csv
    output_files:
      - runtime/source_discovery.csv
      - staging/source_registry_staging.csv
    promotion_rule: Company-specific source candidates must remain unapproved until source verification.
    blocking_conditions:
      - company_not_reviewed
      - missing_source_evidence

  phase3_source_verification:
    name: Source Verification
    input_files:
      - staging/source_registry_staging.csv
      - runtime/source_policy_evidence.csv
      - runtime/source_verification.csv
    output_files:
      - master/source_registry_master.csv
    promotion_rule: Grade A must pass automated checks, or Grade B/C must have human approval_status approved; Grade D remains in manual/legal review.
    blocking_conditions:
      - grade_e
      - grade_f
      - approval_pending
      - approval_rejected
      - approval_expired

  phase4_jd_collection:
    name: JD Collection from Approved Sources Only
    input_files:
      - master/source_registry_master.csv
    output_files:
      - runtime/raw_jd_collection.csv
      - data/raw/raw_jds.csv
      - runtime/jd_collection_log.csv
    promotion_rule: Collection is allowed only from approved source registry entries.
    blocking_conditions:
      - source_not_in_master
      - source_approval_invalid
      - prohibited_collection_method

  phase5_jd_normalization_and_labeling:
    name: JD Normalization, Deduplication, Labeling
    input_files:
      - data/raw/raw_jds.csv
    output_files:
      - data/cleaned/cleaned_jds.csv
      - staging/jd_staging.csv
      - runtime/jd_validation_errors.csv
      - data/labeled/labeled_jds.csv
      - master/jd_master_dataset.csv
    promotion_rule: JD must satisfy schema, approved-source, AI relevance, deduplication, labeling, and quality rules.
    blocking_conditions:
      - missing_required_field
      - source_approval_invalid
      - description_too_short
      - not_ai_related
      - duplicate_jd
      - quality_score_below_threshold

  phase6_jd_resume_matching_research:
    name: Future JD-Resume Matching
    input_files:
      - master/jd_master_dataset.csv
      - configs/taxonomy_v1.yaml
    output_files: []
    promotion_rule: Research phase only; no automated promotion defined yet.
    blocking_conditions:
      - taxonomy_not_aligned
      - missing_traceability
