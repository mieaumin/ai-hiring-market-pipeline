source_grades:
  A:
    label: Official API available
    use_policy: can be approved if policy and evidence are valid
    manual_review_required: false
    human_approval_required: false
    default_approval_status: not_required
    can_move_to_master_when: automated_checks_passed

  B:
    label: Public ATS/API endpoint available
    use_policy: can be approved if public access and policy evidence are valid
    manual_review_required: true
    human_approval_required: true
    default_approval_status: pending
    can_move_to_master_when: human_approval_status_is_approved

  C:
    label: Public company career page or public job page with acceptable robots.txt and Terms of Service
    use_policy: can be approved only after careful human review
    manual_review_required: true
    human_approval_required: true
    default_approval_status: pending
    can_move_to_master_when: human_approval_status_is_approved

  D:
    label: Unclear policy, general scraping needed, or human/legal review required
    use_policy: must remain needs_manual_review or needs_legal_review
    manual_review_required: true
    human_approval_required: true
    default_approval_status: pending
    can_move_to_master_when: not_allowed_until_ambiguity_is_resolved

  E:
    label: Login, CAPTCHA, anti-bot bypass, or prohibited automated collection required
    use_policy: reject
    manual_review_required: true
    human_approval_required: true
    default_approval_status: rejected
    can_move_to_master_when: never

  F:
    label: Unusable, blocked, or legally/policy-wise rejected
    use_policy: reject
    manual_review_required: false
    human_approval_required: false
    default_approval_status: rejected
    can_move_to_master_when: never

approval_status_values:
  - not_required
  - pending
  - approved
  - rejected
  - expired

master_promotion_rules:
  - source_grade_is_A_and_automated_checks_passed
  - source_grade_is_B_or_C_and_human_approval_status_is_approved

blocking_rules:
  - grade_D_requires_manual_or_legal_review
  - grade_E_is_rejected
  - grade_F_is_rejected
  - pending_approval_cannot_move_to_master
  - expired_approval_cannot_move_to_master
  - rejected_approval_cannot_move_to_master

required_verification_checks:
  - official_domain_match
  - robots_compatibility
  - tos_compatibility
  - ats_identification
  - public_access
  - html_structure_quality
  - ai_jd_availability
  - maintenance_risk

collection_policy:
  - conservative_request_rate
  - no_captcha_solving
  - no_anti_bot_bypass
  - no_login_automation
  - no_hidden_endpoints
  - no_prohibited_scraping

job_site_discovery:
  priority: build_korean_job_site_universe_before_company_discovery
  discovery_routes:
    - search_engine_based_discovery
    - reverse_reference_discovery
    - jd_source_reverse_discovery
  site_type_examples:
    - job_portal
    - startup_jobs
    - developer_jobs
    - public_jobs
    - intern_jobs
    - headhunting_platform
    - career_platform
    - community_jobs
    - company_jobs
    - unknown
  current_phase_is_not:
    - ai_only_site_filtering
    - jd_collection
    - large_scale_crawling
    - developer_only_site_restriction
    - company_career_page_discovery

phase0_5_site_screening_grades:
  A: official_api_available
  B: public_ats_or_api_endpoint_available
  C: public_career_or_job_page_with_acceptable_robots_and_terms
  D: unclear_policy_general_scraping_or_human_legal_review_required
  E: login_captcha_antibot_or_prohibited_automated_collection_required
  F: unusable_blocked_or_legally_policy_rejected
  approval_rules:
    - only_A_B_and_carefully_reviewed_C_can_be_approved
    - D_must_remain_needs_manual_review_or_needs_legal_review
    - E_and_F_must_be_rejected
