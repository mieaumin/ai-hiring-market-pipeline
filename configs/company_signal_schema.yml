signals:
  hiring_signal:
    description: Evidence that the company is hiring AI/Data/ML talent.
    score_range: 0-5

  business_ai_signal:
    description: Evidence that the company builds, sells, or applies AI-related products or services.
    score_range: 0-5

  technical_signal:
    description: Evidence of technical capability such as tech blog, GitHub, engineering org, ML platform, or data infrastructure.
    score_range: 0-5

  market_signal:
    description: Evidence of growth, funding, expansion, partnership, or public market attention related to AI/data.
    score_range: 0-5

  research_signal:
    description: Evidence of AI lab, publications, patents, research partnerships, or R&D activity.
    score_range: 0-5

  evidence_quality:
    description: Reliability and freshness of the evidence.
    score_range: 0-5

recommended_screening_thresholds:
  approved:
    minimum_total_score: 15
    minimum_evidence_count: 2
    requires_hiring_or_business_signal: true

  needs_manual_review:
    condition: Ambiguous or insufficient evidence, but potentially relevant.

  excluded:
    condition: No reliable AI hiring or AI business evidence.

screening_statuses:
  - not_reviewed
  - candidate
  - approved
  - needs_manual_review
  - excluded

review_statuses:
  - not_checked
  - checked
  - needs_manual_review

evidence_types:
  - ai_job_posting
  - ai_product_or_service
  - ai_research_lab
  - tech_blog
  - github_org
  - investment_signal
  - government_ai_program
  - ai_partnership
  - press_release
  - career_page
  - other

signal_categories:
  - hiring_signal
  - business_ai_signal
  - technical_signal
  - market_signal
  - research_signal
  - weak_signal

signal_strengths:
  - strong
  - medium
  - weak
  - unclear

