related_keyword_expansion_notes:
  - Related keywords are used to expand discovery manually or through allowed official/public search APIs only.
  - Search result pages must not be scraped when the search provider policy does not allow it.
  - Expanded keywords should be recorded in runtime/raw_job_site_discovery.csv as discovery_query values.
  - Query expansion is for discovering possible job-site sources, not collecting job postings.
